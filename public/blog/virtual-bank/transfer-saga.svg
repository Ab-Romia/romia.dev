<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="vs-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker>
    <marker id="vs-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#A1A1AA"/></marker>
    <marker id="vs-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
  </defs>

  <!-- ===================== swim lanes ===================== -->
  <rect x="14" y="44" width="892" height="78" rx="10" fill="#71717A" fill-opacity="0.03" stroke="#71717A" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="14" y="130" width="892" height="118" rx="10" fill="#10B981" fill-opacity="0.025" stroke="#71717A" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="14" y="256" width="892" height="86" rx="10" fill="#A1A1AA" fill-opacity="0.03" stroke="#71717A" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="14" y="350" width="892" height="100" rx="10" fill="#10B981" fill-opacity="0.025" stroke="#71717A" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="26" y="38" font-size="11" font-weight="700" fill="#34D399">The transfer saga</text>

  <text x="24" y="68" font-size="10" font-weight="600" fill="#A1A1AA">client</text>
  <text x="24" y="152" font-size="10" font-weight="600" fill="#34D399">transaction-service</text>
  <text x="24" y="278" font-size="10" font-weight="600" fill="#A1A1AA">Kafka</text>
  <text x="24" y="372" font-size="10" font-weight="600" fill="#34D399">account-service</text>

  <!-- ===================== step 1: client POST ===================== -->
  <rect x="100" y="56" width="150" height="54" rx="9" fill="#71717A" fill-opacity="0.1" stroke="#71717A" stroke-width="1.3"/>
  <text x="175" y="78" text-anchor="middle" font-size="10.5" font-weight="600" fill="#A1A1AA">POST /transfers</text>
  <text x="175" y="94" text-anchor="middle" font-size="8.5" fill="#71717A">Idempotency-Key: ...</text>
  <text x="175" y="105" text-anchor="middle" font-size="8" fill="#71717A">1</text>

  <!-- client -> transaction-service -->
  <line x1="175" y1="110" x2="175" y2="152" stroke="#10B981" stroke-width="1.6" marker-end="url(#vs-g)"/>

  <!-- ===================== step 2: transaction-service writes PENDING + OUTBOX ===================== -->
  <rect x="92" y="152" width="248" height="82" rx="10" fill="#10B981" fill-opacity="0.08" stroke="#34D399" stroke-width="1.4"/>
  <text x="216" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#34D399">one DB transaction</text>
  <rect x="104" y="182" width="106" height="42" rx="7" fill="#10B981" fill-opacity="0.1" stroke="#34D399" stroke-width="1.2"/>
  <text x="157" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#34D399">transfer</text>
  <text x="157" y="214" text-anchor="middle" font-size="9" font-weight="600" fill="#34D399">PENDING</text>
  <rect x="222" y="182" width="106" height="42" rx="7" fill="#10B981" fill-opacity="0.1" stroke="#34D399" stroke-width="1.2"/>
  <text x="275" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#34D399">OUTBOX row</text>
  <text x="275" y="214" text-anchor="middle" font-size="8" fill="#A1A1AA">TransferRequested</text>
  <text x="100" y="148" font-size="8" fill="#71717A">2</text>

  <!-- 202 back to client -->
  <line x1="290" y1="152" x2="290" y2="112" stroke="#10B981" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#vs-g)"/>
  <rect x="300" y="80" width="92" height="26" rx="6" fill="#10B981" fill-opacity="0.08" stroke="#34D399" stroke-width="1.1"/>
  <text x="346" y="97" text-anchor="middle" font-size="9" font-weight="600" fill="#34D399">202 Accepted</text>

  <!-- ===================== step 3: relay publishes outbox -> Kafka ===================== -->
  <rect x="380" y="158" width="118" height="70" rx="9" fill="#10B981" fill-opacity="0.06" stroke="#34D399" stroke-width="1.3"/>
  <text x="439" y="186" text-anchor="middle" font-size="9.5" font-weight="600" fill="#34D399">relay</text>
  <text x="439" y="201" text-anchor="middle" font-size="8" fill="#A1A1AA">reads outbox,</text>
  <text x="439" y="212" text-anchor="middle" font-size="8" fill="#A1A1AA">publishes once</text>
  <text x="388" y="154" font-size="8" fill="#71717A">3</text>

  <line x1="340" y1="200" x2="378" y2="194" stroke="#10B981" stroke-width="1.5" marker-end="url(#vs-g)"/>

  <!-- relay -> Kafka commands topic -->
  <line x1="439" y1="228" x2="439" y2="278" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#vs-m)"/>
  <rect x="372" y="278" width="134" height="48" rx="8" fill="#A1A1AA" fill-opacity="0.07" stroke="#A1A1AA" stroke-width="1.2"/>
  <text x="439" y="298" text-anchor="middle" font-size="9.5" font-weight="600" fill="#A1A1AA">transfer.commands</text>
  <text x="439" y="313" text-anchor="middle" font-size="8" fill="#71717A">at-least-once delivery</text>

  <!-- ===================== step 4: account-service consumes ===================== -->
  <line x1="439" y1="326" x2="439" y2="372" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#vs-m)"/>

  <rect x="372" y="372" width="216" height="66" rx="10" fill="#10B981" fill-opacity="0.08" stroke="#34D399" stroke-width="1.4"/>
  <text x="480" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="#34D399">one atomic local transaction</text>
  <text x="480" y="408" text-anchor="middle" font-size="8.5" fill="#A1A1AA">lock both accounts (pessimistic),</text>
  <text x="480" y="420" text-anchor="middle" font-size="8.5" fill="#A1A1AA">debit + credit, idempotent on transferId</text>
  <text x="380" y="368" font-size="8" fill="#71717A">4</text>

  <!-- account-service emits via own outbox -> transfer.events -->
  <path d="M588 392 C 640 360, 660 330, 660 326" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#vs-m)"/>
  <text x="648" y="356" text-anchor="middle" font-size="8" fill="#A1A1AA">own outbox</text>

  <rect x="596" y="278" width="134" height="48" rx="8" fill="#A1A1AA" fill-opacity="0.07" stroke="#A1A1AA" stroke-width="1.2"/>
  <text x="663" y="298" text-anchor="middle" font-size="9.5" font-weight="600" fill="#A1A1AA">transfer.events</text>
  <text x="663" y="313" text-anchor="middle" font-size="8" fill="#71717A">Completed / Failed</text>
  <text x="604" y="274" font-size="8" fill="#71717A">5</text>

  <!-- transfer.events -> transaction-service marks COMPLETED -->
  <path d="M663 278 C 663 250, 700 250, 700 234" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#vs-m)"/>

  <rect x="628" y="152" width="150" height="58" rx="10" fill="#10B981" fill-opacity="0.1" stroke="#34D399" stroke-width="1.4"/>
  <text x="703" y="176" text-anchor="middle" font-size="10" font-weight="700" fill="#34D399">mark COMPLETED</text>
  <text x="703" y="192" text-anchor="middle" font-size="8.5" fill="#A1A1AA">transfer-service updates</text>
  <text x="703" y="203" text-anchor="middle" font-size="8.5" fill="#A1A1AA">final saga state</text>
  <text x="636" y="148" font-size="8" fill="#71717A">6</text>

  <!-- ===================== FAILED branch (red) ===================== -->
  <rect x="628" y="372" width="150" height="58" rx="10" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1.3"/>
  <text x="703" y="396" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">FAILED</text>
  <text x="703" y="412" text-anchor="middle" font-size="8.5" fill="#A1A1AA">insufficient funds,</text>
  <text x="703" y="423" text-anchor="middle" font-size="8.5" fill="#A1A1AA">CHECK(balance &#62;= 0) trips</text>
  <line x1="588" y1="416" x2="626" y2="408" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#vs-r)"/>
  <text x="610" y="402" text-anchor="middle" font-size="7.5" fill="#ef4444">rejected</text>

  <!-- ===================== three correctness guarantees ===================== -->
  <g transform="translate(800,150)">
    <rect x="0" y="0" width="106" height="64" rx="8" fill="#10B981" fill-opacity="0.06" stroke="#34D399" stroke-width="1.2"/>
    <text x="53" y="18" text-anchor="middle" font-size="8.5" font-weight="700" fill="#34D399">transactional</text>
    <text x="53" y="30" text-anchor="middle" font-size="8.5" font-weight="700" fill="#34D399">outbox</text>
    <text x="53" y="48" text-anchor="middle" font-size="8" fill="#A1A1AA">no lost</text>
    <text x="53" y="58" text-anchor="middle" font-size="8" fill="#A1A1AA">events</text>
  </g>
  <g transform="translate(800,225)">
    <rect x="0" y="0" width="106" height="64" rx="8" fill="#10B981" fill-opacity="0.06" stroke="#34D399" stroke-width="1.2"/>
    <text x="53" y="18" text-anchor="middle" font-size="8.5" font-weight="700" fill="#34D399">idempotent</text>
    <text x="53" y="30" text-anchor="middle" font-size="8.5" font-weight="700" fill="#34D399">consumer</text>
    <text x="53" y="48" text-anchor="middle" font-size="8" fill="#A1A1AA">no double</text>
    <text x="53" y="58" text-anchor="middle" font-size="8" fill="#A1A1AA">apply</text>
  </g>
  <g transform="translate(800,360)">
    <rect x="0" y="0" width="106" height="76" rx="8" fill="#10B981" fill-opacity="0.06" stroke="#34D399" stroke-width="1.2"/>
    <text x="53" y="18" text-anchor="middle" font-size="8.5" font-weight="700" fill="#34D399">pessimistic lock</text>
    <text x="53" y="30" text-anchor="middle" font-size="8" fill="#A1A1AA">+ CHECK(balance</text>
    <text x="53" y="40" text-anchor="middle" font-size="8" fill="#A1A1AA">&#62;= 0)</text>
    <text x="53" y="58" text-anchor="middle" font-size="8" fill="#A1A1AA">no double</text>
    <text x="53" y="68" text-anchor="middle" font-size="8" fill="#A1A1AA">spend</text>
  </g>

  <!-- legend -->
  <g transform="translate(540,40)">
    <line x1="0" y1="-4" x2="26" y2="-4" stroke="#10B981" stroke-width="1.6" marker-end="url(#vs-g)"/>
    <text x="32" y="-1" font-size="8.5" fill="#A1A1AA">happy path (REST)</text>
    <line x1="150" y1="-4" x2="176" y2="-4" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#vs-m)"/>
    <text x="182" y="-1" font-size="8.5" fill="#A1A1AA">async event</text>
    <line x1="270" y1="-4" x2="296" y2="-4" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#vs-r)"/>
    <text x="302" y="-1" font-size="8.5" fill="#A1A1AA">failed branch</text>
  </g>
</svg>
