<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="va-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker>
    <marker id="va-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#71717A"/></marker>
    <marker id="va-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#A1A1AA"/></marker>
  </defs>

  <!-- ===================== public edge boundary ===================== -->
  <rect x="14" y="40" width="156" height="396" rx="12" fill="#71717A" fill-opacity="0.04" stroke="#71717A" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="30" y="32" font-size="11" font-weight="600" fill="#A1A1AA">public</text>

  <!-- private boundary -->
  <rect x="190" y="40" width="556" height="396" rx="12" fill="#10B981" fill-opacity="0.025" stroke="#71717A" stroke-width="1.2"/>
  <text x="206" y="32" font-size="11" font-weight="600" fill="#A1A1AA">private (no inbound from the internet)</text>

  <!-- Client -->
  <rect x="34" y="200" width="116" height="68" rx="10" fill="#71717A" fill-opacity="0.1" stroke="#71717A" stroke-width="1.3"/>
  <text x="92" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#A1A1AA">Client</text>
  <text x="92" y="248" text-anchor="middle" font-size="9" fill="#71717A">browser / app</text>

  <!-- Client -> Gateway (sync REST) -->
  <line x1="150" y1="234" x2="230" y2="234" stroke="#10B981" stroke-width="1.6" marker-end="url(#va-g)"/>
  <text x="190" y="226" text-anchor="middle" font-size="8.5" fill="#34D399">REST + JWT</text>

  <!-- Gateway -->
  <rect x="230" y="196" width="120" height="76" rx="10" fill="#10B981" fill-opacity="0.12" stroke="#34D399" stroke-width="1.4"/>
  <text x="290" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#34D399">Gateway</text>
  <text x="290" y="239" text-anchor="middle" font-size="8.5" fill="#A1A1AA">validates JWT,</text>
  <text x="290" y="251" text-anchor="middle" font-size="8.5" fill="#A1A1AA">routes requests</text>
  <text x="290" y="265" text-anchor="middle" font-size="8" fill="#34D399" font-weight="600">single public entry</text>

  <!-- ===================== services column ===================== -->
  <!-- user-service -->
  <rect x="430" y="64" width="150" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#34D399" stroke-width="1.3"/>
  <text x="505" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">user-service</text>
  <text x="505" y="104" text-anchor="middle" font-size="8.5" fill="#A1A1AA">identity, auth tokens</text>

  <!-- account-service -->
  <rect x="430" y="142" width="150" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#34D399" stroke-width="1.3"/>
  <text x="505" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">account-service</text>
  <text x="505" y="182" text-anchor="middle" font-size="8.5" fill="#A1A1AA">balances, debit / credit</text>

  <!-- transaction-service -->
  <rect x="430" y="220" width="150" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#34D399" stroke-width="1.3"/>
  <text x="505" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">transaction-service</text>
  <text x="505" y="260" text-anchor="middle" font-size="8.5" fill="#A1A1AA">transfers, saga state</text>

  <!-- audit-service -->
  <rect x="430" y="298" width="150" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#34D399" stroke-width="1.3"/>
  <text x="505" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">audit-service</text>
  <text x="505" y="338" text-anchor="middle" font-size="8.5" fill="#A1A1AA">append-only event log</text>

  <!-- Gateway -> services (sync REST) -->
  <path d="M350 220 C 392 200, 400 110, 428 96" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#va-g)"/>
  <path d="M350 226 C 392 220, 400 180, 428 172" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#va-g)"/>
  <path d="M350 246 L 428 248" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#va-g)"/>

  <!-- per-service databases -->
  <g fill="#71717A" fill-opacity="0.08" stroke="#71717A" stroke-width="1.2">
    <ellipse cx="640" cy="78" rx="22" ry="6"/>
    <path d="M618 78 V 100 a22 6 0 0 0 44 0 V 78" fill="#71717A" fill-opacity="0.08"/>
    <ellipse cx="640" cy="156" rx="22" ry="6"/>
    <path d="M618 156 V 178 a22 6 0 0 0 44 0 V 156" fill="#71717A" fill-opacity="0.08"/>
    <ellipse cx="640" cy="234" rx="22" ry="6"/>
    <path d="M618 234 V 256 a22 6 0 0 0 44 0 V 234" fill="#71717A" fill-opacity="0.08"/>
    <ellipse cx="640" cy="312" rx="22" ry="6"/>
    <path d="M618 312 V 334 a22 6 0 0 0 44 0 V 312" fill="#71717A" fill-opacity="0.08"/>
  </g>
  <text x="640" y="98" text-anchor="middle" font-size="8" fill="#A1A1AA">db</text>
  <text x="640" y="176" text-anchor="middle" font-size="8" fill="#A1A1AA">db</text>
  <text x="640" y="254" text-anchor="middle" font-size="8" fill="#A1A1AA">db</text>
  <text x="640" y="332" text-anchor="middle" font-size="8" fill="#A1A1AA">db</text>
  <text x="700" y="200" text-anchor="middle" font-size="9" fill="#71717A" transform="rotate(90 700 200)">PostgreSQL: one database per service</text>

  <!-- service -> own db -->
  <line x1="580" y1="92" x2="616" y2="90" stroke="#71717A" stroke-width="1.2" marker-end="url(#va-m)"/>
  <line x1="580" y1="170" x2="616" y2="168" stroke="#71717A" stroke-width="1.2" marker-end="url(#va-m)"/>
  <line x1="580" y1="248" x2="616" y2="246" stroke="#71717A" stroke-width="1.2" marker-end="url(#va-m)"/>
  <line x1="580" y1="326" x2="616" y2="324" stroke="#71717A" stroke-width="1.2" marker-end="url(#va-m)"/>

  <!-- ===================== Kafka broker ===================== -->
  <rect x="252" y="320" width="150" height="96" rx="10" fill="#A1A1AA" fill-opacity="0.06" stroke="#A1A1AA" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="327" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#A1A1AA">Kafka (KRaft)</text>
  <rect x="266" y="352" width="122" height="24" rx="6" fill="#A1A1AA" fill-opacity="0.08" stroke="#A1A1AA" stroke-width="1.1"/>
  <text x="327" y="368" text-anchor="middle" font-size="8.5" fill="#A1A1AA">topic: transfer.commands</text>
  <rect x="266" y="382" width="122" height="24" rx="6" fill="#A1A1AA" fill-opacity="0.08" stroke="#A1A1AA" stroke-width="1.1"/>
  <text x="327" y="398" text-anchor="middle" font-size="8.5" fill="#A1A1AA">topic: transfer.events</text>

  <!-- async path: transaction-service -> transfer.commands -->
  <path d="M448 278 C 430 300, 400 330, 388 350" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>
  <text x="418" y="312" text-anchor="middle" font-size="8" fill="#A1A1AA">publish</text>

  <!-- transfer.commands -> account-service -->
  <path d="M390 360 C 420 356, 470 280, 478 280" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>
  <text x="448" y="334" text-anchor="middle" font-size="8" fill="#A1A1AA">consume</text>

  <!-- account-service -> transfer.events -->
  <path d="M470 200 C 415 250, 360 300, 348 350" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>
  <text x="372" y="262" text-anchor="middle" font-size="8" fill="#A1A1AA">emit result</text>

  <!-- transfer.events -> transaction-service -->
  <path d="M338 382 C 360 360, 420 290, 450 278" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>

  <!-- transfer.events -> audit-service -->
  <path d="M390 396 C 420 380, 470 350, 478 340" fill="none" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>

  <!-- ===================== legend ===================== -->
  <g transform="translate(34,300)">
    <text x="0" y="0" font-size="10" font-weight="600" fill="#A1A1AA">Legend</text>
    <line x1="0" y1="20" x2="34" y2="20" stroke="#10B981" stroke-width="1.6" marker-end="url(#va-g)"/>
    <text x="0" y="38" font-size="8.5" fill="#A1A1AA">synchronous REST</text>
    <line x1="0" y1="58" x2="34" y2="58" stroke="#A1A1AA" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#va-a)"/>
    <text x="0" y="76" font-size="8.5" fill="#A1A1AA">asynchronous events</text>
    <line x1="0" y1="96" x2="34" y2="96" stroke="#71717A" stroke-width="1.2" marker-end="url(#va-m)"/>
    <text x="0" y="114" font-size="8.5" fill="#A1A1AA">database write</text>
  </g>

  <!-- title -->
  <text x="380" y="456" text-anchor="middle" font-size="9.5" fill="#71717A">Only the gateway is reachable from the internet. Services talk REST for reads and Kafka for the transfer workflow.</text>
</svg>
