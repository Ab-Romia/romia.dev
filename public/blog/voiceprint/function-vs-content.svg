<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif"><text x="40" y="34" font-size="11" fill="#A1A1AA">Same author, two topics</text><g font-size="19" font-weight="600"><text x="60" y="82" fill="#10B981">The</text><text x="110" y="82" fill="#71717A">ship</text><text x="172" y="82" fill="#71717A">sailed</text><text x="258" y="82" fill="#10B981">past</text><text x="316" y="82" fill="#10B981">the</text><text x="362" y="82" fill="#71717A">harbor.</text></g><g font-size="19" font-weight="600"><text x="60" y="126" fill="#10B981">The</text><text x="100" y="126" fill="#71717A">garden</text><text x="174" y="126" fill="#71717A">bloomed</text><text x="258" y="126" fill="#10B981">past</text><text x="316" y="126" fill="#10B981">the</text><text x="362" y="126" fill="#71717A">fence.</text></g><g stroke="#10B981" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"><line x1="78" y1="90" x2="78" y2="112"/><line x1="280" y1="90" x2="280" y2="112"/><line x1="332" y1="90" x2="332" y2="112"/></g><g transform="translate(500,62)"><rect x="0" y="0" width="190" height="42" rx="8" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1.3"/><rect x="12" y="15" width="9" height="11" rx="2" fill="none" stroke="#10B981" stroke-width="1.3"/><path d="M14 15 v-3 a2.5 2.5 0 0 1 5 0 v3" fill="none" stroke="#10B981" stroke-width="1.3"/><text x="30" y="19" font-size="10" font-weight="600" fill="#10B981">stays constant</text><text x="30" y="33" font-size="9.5" fill="#A1A1AA">carries the author</text></g><g transform="translate(500,114)"><rect x="0" y="0" width="190" height="42" rx="8" fill="#71717A" fill-opacity="0.08" stroke="#71717A" stroke-width="1.3"/><path d="M13 28 a7 7 0 1 1 2 -10 M16 14 v4 h-4" fill="none" stroke="#71717A" stroke-width="1.3"/><text x="30" y="19" font-size="10" font-weight="600" fill="#71717A">changes with topic</text><text x="30" y="33" font-size="9.5" fill="#A1A1AA">carries the subject</text></g><line x1="40" y1="180" x2="680" y2="180" stroke="#27272A" stroke-width="1"/><text x="40" y="218" font-size="13" fill="#A1A1AA">Build your classifier on the <tspan fill="#71717A" font-weight="600">gray words</tspan> and you learn the topic,</text><text x="40" y="240" font-size="13" fill="#A1A1AA">not the person.</text></svg>