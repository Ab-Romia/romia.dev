"230" font-size="10.5" fill="#ef4444">= memorizes the book</text><rect x="376" y="14" width="330" height="230" rx="12" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.2"/><text x="392" y="40" font-size="13" font-weight="600" fill="#10B981">Honest split <tspan fill="#34D399">(topic-independent)</tspan></text><rect x="402" y="60" width="30" height="40" rx="4" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1.2"/><text x="417" y="114" text-anchor="middle" font-size="9" fill="#A1A1AA">Book 1</text><rect x="402" y="138" width="30" height="40" rx="4" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-width="1.2"/><text x="417" y="192" text-anchor="middle" font-size="9" fill="#A1A1AA">Book 2</text><path d="M436 80 C500 80 510 80 556 80" fill="none" stroke="#10B981" stroke-width="1.4" marker-end="url(#lg)"/><path d="M436 158 C500 158 510 158 556 158" fill="none" stroke="#10B981" stroke-width="1.4" marker-end="url(#lg)"/><rect x="560" y="62" width="110" height="36" rx="7" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1.2"/><text x="615" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">Train</text><rect x="560" y="140" width="110" height="36" rx="7" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1.2"/><text x="615" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">Test</text><text x="392" y="222" font-size="10.5" fill="#10B981">tested on a work it never saw</text><text x="40" y="288" font-size="11" fill="#A1A1AA"><tspan fill="#10B981" font-weight="600">Austen / Chesterton / Shakespeare</tspan> = honest split, held-out work</text><text x="40" y="312" font-size="11" fill="#A1A1AA"><tspan fill="#d97706" font-weight="600">Carroll / Melville</tspan> = single book, leaky: a soft upper bound</text></svg>