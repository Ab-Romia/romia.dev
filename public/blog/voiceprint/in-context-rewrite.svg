<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif"><defs><marker id="cv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker></defs><rect x="16" y="30" width="170" height="44" rx="9" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.3"/><text x="101" y="50" text-anchor="middle" font-size="11.5" font-weight="600" fill="#10B981">Your draft</text><text x="101" y="66" text-anchor="middle" font-size="9" fill="#A1A1AA">the text to rewrite</text><rect x="16" y="100" width="170" height="44" rx="9" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.3"/><text x="101" y="120" text-anchor="middle" font-size="11.5" font-weight="600" fill="#10B981">Your exemplars</text><text x="101" y="136" text-anchor="middle" font-size="9" fill="#A1A1AA">3 to 5 real excerpts</text><rect x="16" y="170" width="170" height="64" rx="9" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.3"/><text x="101" y="190" text-anchor="middle" font-size="11.5" font-weight="600" fill="#10B981">Measured constraints</text><text x="28" y="206" font-size="8.7" fill="#A1A1AA">avg sentence ~18 words</text><text x="28" y="219" font-size="8.7" fill="#A1A1AA">use contractions</text><text x="28" y="232" font-size="8.7" fill="#A1A1AA">commas ~4 per 100 words</text><path d="M186 52 C260 52 270 120 326 124" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#cv)"/><path d="M186 122 C260 122 270 130 326 132" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#cv)"/><path d="M186 200 C260 200 270 144 326 140" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#cv)"/><rect x="330" y="96" width="176" height="76" rx="11" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1.8"/><text x="418" y="124" text-anchor="middle" font-size="11.5" font-weight="700" fill="#10B981">One model call</text><text x="418" y="142" text-anchor="middle" font-size="9" fill="#A1A1AA">rewrite, preserve meaning,</text><text x="418" y="156" text-anchor="middle" font-size="9" fill="#A1A1AA">return only the rewrite</text><line x1="506" y1="134" x2="556" y2="134" stroke="#10B981" stroke-width="1.8" marker-end="url(#cv)"/><rect x="560" y="100" width="148" height="68" rx="11" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.3"/><text x="634" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">Rewritten draft</text><text x="634" y="146" text-anchor="middle" font-size="9" fill="#A1A1AA">same meaning,</text><text x="634" y="159" text-anchor="middle" font-size="9" fill="#A1A1AA">your voice</text><g opacity="0.55"><rect x="60" y="282" width="600" height="42" rx="9" fill="#71717A" fill-opacity="0.06" stroke="#71717A" stroke-width="1.2" stroke-dasharray="5 4"/><line x1="60" y1="282" x2="660" y2="324" stroke="#ef4444" stroke-width="1.3"/><line x1="660" y1="282" x2="60" y2="324" stroke="#ef4444" stroke-width="1.3"/><text x="360" y="300" text-anchor="middle" font-size="10.5" font-weight="600" fill="#71717A">Dead end (2021): synonym swaps, random punctuation, injected typos</text><text x="360" y="317" text-anchor="middle" font-size="9.5" fill="#71717A">word-level edits</text></g><text x="360" y="352" text-anchor="middle" font-size="12" fill="#A1A1AA">Word-level edits change meaning; voice lives in structure and rhythm.</text></svg>