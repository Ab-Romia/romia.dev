<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker><marker id="ahd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#71717A"/></marker></defs><rect x="16" y="118" width="118" height="84" rx="12" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-width="1.5"/><text x="75" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#10B981">Your samples</text><text x="75" y="172" text-anchor="middle" font-size="9.5" fill="#A1A1AA">at least 3 samples</text><text x="75" y="186" text-anchor="middle" font-size="9.5" fill="#A1A1AA">500+ words</text><line x1="134" y1="160" x2="194" y2="160" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah)"/><rect x="198" y="108" width="140" height="104" rx="12" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-width="1.5"/><circle cx="268" cy="138" r="11" fill="none" stroke="#34D399" stroke-width="1.3"/><circle cx="268" cy="138" r="5" fill="none" stroke="#34D399" stroke-width="1.3"/><text x="268" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#10B981">Fingerprint</text><text x="268" y="190" text-anchor="middle" font-size="8.8" fill="#A1A1AA">function words, sentence length,</text><text x="268" y="202" text-anchor="middle" font-size="8.8" fill="#A1A1AA">comma rate, neural embedding</text><path d="M300 108 C300 70 360 64 416 64" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah)"/><rect x="420" y="36" width="126" height="60" rx="12" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-width="1.5"/><text x="483" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">Score a draft</text><text x="483" y="82" text-anchor="middle" font-size="9" fill="#A1A1AA">voice match 0 to 1</text><line x1="338" y1="160" x2="416" y2="160" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah)"/><rect x="420" y="118" width="126" height="84" rx="12" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-width="1.5"/><text x="483" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">Adapt the draft</text><text x="483" y="170" text-anchor="middle" font-size="9" fill="#A1A1AA">one model call,</text><text x="483" y="183" text-anchor="middle" font-size="9" fill="#A1A1AA">meaning preserved</text><line x1="546" y1="160" x2="606" y2="160" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah)"/><rect x="610" y="118" width="98" height="84" rx="12" fill="#10B981" fill-opacity="0.06" stroke="#10B981" stroke-width="1.5"/><text x="659" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">Validate</text><text x="659" y="169" text-anchor="middle" font-size="8.4" fill="#A1A1AA">before vs after,</text><text x="659" y="181" text-anchor="middle" font-size="8.4" fill="#A1A1AA">per-sentence diff</text><path d="M659 118 C659 92 560 80 546 70" fill="none" stroke="#71717A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ahd)"/><text x="600" y="104" text-anchor="middle" font-size="8.5" fill="#71717A">re-score</text></svg>