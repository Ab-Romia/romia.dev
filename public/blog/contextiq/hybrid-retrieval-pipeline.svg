<svg viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#71717A"/>
    </marker>
  </defs>

  <!-- ===== TOP LANE: Indexing ===== -->
  <text x="28" y="34" font-size="12" fill="#34D399" font-weight="600">Indexing (once per document)</text>
  <rect x="28" y="44" width="864" height="184" rx="12" fill="#10B981" fill-opacity="0.03" stroke="#27272A" stroke-width="1"/>

  <!-- Document -->
  <rect x="44" y="118" width="110" height="44" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="99" y="144" font-size="12" fill="#A1A1AA" text-anchor="middle">Document</text>

  <!-- Chunk -->
  <rect x="186" y="111" width="150" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="261" y="135" font-size="12" fill="#A1A1AA" text-anchor="middle">Chunk</text>
  <text x="261" y="152" font-size="10" fill="#71717A" text-anchor="middle">400 tok, 60 overlap</text>

  <!-- Augment header -->
  <rect x="368" y="111" width="138" height="58" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="437" y="135" font-size="12" fill="#A1A1AA" text-anchor="middle">Augment</text>
  <text x="437" y="152" font-size="11" fill="#A1A1AA" text-anchor="middle">header</text>

  <!-- Embed -> Chroma (upper) -->
  <rect x="586" y="74" width="206" height="50" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="689" y="95" font-size="11.5" fill="#A1A1AA" text-anchor="middle">Embed: bge-small 384d</text>
  <text x="689" y="112" font-size="10.5" fill="#34D399" text-anchor="middle">to Chroma</text>

  <!-- BM25 index (lower) -->
  <rect x="586" y="150" width="206" height="50" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="689" y="172" font-size="11.5" fill="#A1A1AA" text-anchor="middle">BM25 index</text>
  <text x="689" y="189" font-size="10.5" fill="#71717A" text-anchor="middle">(bm25s)</text>

  <!-- top arrows -->
  <line x1="154" y1="140" x2="182" y2="140" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="336" y1="140" x2="364" y2="140" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- branch from augment to two boxes -->
  <path d="M506,134 C545,134 545,99 582,99" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M506,146 C545,146 545,175 582,175" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== BOTTOM LANE: Query time ===== -->
  <text x="28" y="270" font-size="12" fill="#34D399" font-weight="600">Query time</text>
  <rect x="28" y="280" width="864" height="224" rx="12" fill="#10B981" fill-opacity="0.03" stroke="#27272A" stroke-width="1"/>

  <!-- Question -->
  <rect x="44" y="368" width="104" height="44" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="96" y="394" font-size="12" fill="#A1A1AA" text-anchor="middle">Question</text>

  <!-- Dense search (upper) -->
  <rect x="180" y="316" width="150" height="50" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="255" y="338" font-size="11.5" fill="#A1A1AA" text-anchor="middle">Dense search</text>
  <text x="255" y="354" font-size="10.5" fill="#71717A" text-anchor="middle">(top 50)</text>

  <!-- Lexical search (lower) -->
  <rect x="180" y="414" width="150" height="50" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="255" y="436" font-size="11.5" fill="#A1A1AA" text-anchor="middle">Lexical search</text>
  <text x="255" y="452" font-size="10.5" fill="#71717A" text-anchor="middle">(top 50)</text>

  <!-- RRF -->
  <rect x="364" y="364" width="150" height="52" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="439" y="386" font-size="11.5" fill="#A1A1AA" text-anchor="middle">Reciprocal rank</text>
  <text x="439" y="402" font-size="11" fill="#34D399" text-anchor="middle">fusion (k=60)</text>

  <!-- Cross-encoder rerank -->
  <rect x="548" y="364" width="158" height="52" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="627" y="386" font-size="11.5" fill="#A1A1AA" text-anchor="middle">Cross-encoder rerank</text>
  <text x="627" y="402" font-size="10.5" fill="#71717A" text-anchor="middle">MiniLM-L-6</text>

  <!-- Top 5 sources -->
  <rect x="740" y="364" width="136" height="52" rx="9" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.4"/>
  <text x="808" y="394" font-size="12" fill="#A1A1AA" text-anchor="middle">Top 5 sources</text>

  <!-- Grounded generation (output, emerald filled) -->
  <rect x="600" y="438" width="250" height="50" rx="10" fill="#047857" fill-opacity="0.12" stroke="#34D399" stroke-width="1.6"/>
  <text x="725" y="460" font-size="12" fill="#34D399" text-anchor="middle" font-weight="600">Grounded generation</text>
  <text x="725" y="476" font-size="10.5" fill="#A1A1AA" text-anchor="middle">cite or abstain</text>

  <!-- Cited answer pill -->
  <rect x="364" y="440" width="180" height="44" rx="22" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1.5"/>
  <text x="454" y="467" font-size="12" fill="#34D399" text-anchor="middle">Cited answer [1][2]</text>

  <!-- bottom arrows -->
  <!-- question fans out -->
  <path d="M148,384 C160,384 160,341 176,341" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M148,396 C160,396 160,439 176,439" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- both into RRF -->
  <path d="M330,341 C347,341 347,381 360,381" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M330,439 C347,439 347,400 360,400" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- RRF -> rerank -->
  <line x1="514" y1="390" x2="544" y2="390" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- rerank -> top 5 -->
  <line x1="706" y1="390" x2="736" y2="390" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- top 5 -> grounded generation -->
  <path d="M808,416 C808,431 800,440 825,448" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- grounded -> cited answer -->
  <line x1="596" y1="462" x2="550" y2="462" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== reuse links (gray dashed) ===== -->
  <path d="M650,124 C650,210 300,250 255,312" fill="none" stroke="#71717A" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
  <path d="M730,200 C760,250 380,270 268,410" fill="none" stroke="#71717A" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
  <text x="468" y="246" font-size="9.5" fill="#71717A" text-anchor="middle">reuse index</text>
</svg>
