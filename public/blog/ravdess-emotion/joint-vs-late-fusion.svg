<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
    <marker id="ar-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker>
    <marker id="ar-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#71717A"/></marker>
  </defs>

  <!-- ===================== LEFT PANEL: naive joint (fails) ===================== -->
  <rect x="14" y="14" width="330" height="352" rx="12" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="30" y="40" font-size="13" font-weight="600" fill="#ef4444">Naive joint / gated fusion</text>
  <text x="30" y="55" font-size="10" fill="#A1A1AA">one network trained on both streams</text>

  <!-- input feature boxes -->
  <rect x="34" y="80" width="120" height="34" rx="7" fill="#71717A" fill-opacity="0.12" stroke="#71717A" stroke-width="1.2"/>
  <text x="94" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#A1A1AA">audio features</text>

  <rect x="34" y="146" width="120" height="34" rx="7" fill="#71717A" fill-opacity="0.12" stroke="#71717A" stroke-width="1.2"/>
  <text x="94" y="167" text-anchor="middle" font-size="11" font-weight="600" fill="#A1A1AA">face features</text>

  <!-- fusion head -->
  <rect x="220" y="100" width="104" height="62" rx="9" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1.3"/>
  <text x="272" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">one learned</text>
  <text x="272" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">fusion head</text>

  <!-- audio arrow (thin) -->
  <line x1="154" y1="97" x2="216" y2="118" stroke="#71717A" stroke-width="1.3" marker-end="url(#ar-m)"/>
  <!-- face arrow (thick, red) -->
  <line x1="154" y1="163" x2="216" y2="146" stroke="#ef4444" stroke-width="3.4" marker-end="url(#ar-r)"/>
  <text x="150" y="200" font-size="9.5" fill="#ef4444">optimizer leans on the easier</text>
  <text x="150" y="213" font-size="9.5" fill="#ef4444">stream (leftover identity)</text>

  <!-- output badge red -->
  <line x1="272" y1="162" x2="272" y2="252" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#ar-r)"/>
  <rect x="60" y="258" width="238" height="78" rx="10" fill="#ef4444" fill-opacity="0.10" stroke="#ef4444" stroke-width="1.3"/>
  <text x="179" y="288" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">43&#8211;47%</text>
  <text x="179" y="312" text-anchor="middle" font-size="10" fill="#A1A1AA">modality competition: collapses</text>
  <text x="179" y="325" text-anchor="middle" font-size="10" fill="#A1A1AA">below audio alone</text>

  <!-- ===================== RIGHT PANEL: calibrated late fusion (works) ===================== -->
  <rect x="376" y="14" width="330" height="352" rx="12" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1.2"/>
  <text x="392" y="40" font-size="13" font-weight="600" fill="#10B981">Calibrated late fusion</text>
  <text x="392" y="55" font-size="10" fill="#A1A1AA">two separate stacks, average the probabilities</text>

  <!-- Audio stack -->
  <rect x="396" y="74" width="120" height="30" rx="7" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.2"/>
  <text x="456" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">Audio model</text>
  <line x1="456" y1="104" x2="456" y2="118" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="404" y="120" width="104" height="26" rx="6" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.1"/>
  <text x="456" y="137" text-anchor="middle" font-size="9.5" fill="#A1A1AA">probabilities</text>
  <line x1="456" y1="146" x2="456" y2="160" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="404" y="162" width="104" height="24" rx="12" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.1"/>
  <text x="456" y="177" text-anchor="middle" font-size="9" fill="#34D399">temperature scale (val)</text>

  <!-- Face stack -->
  <rect x="566" y="74" width="120" height="30" rx="7" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.2"/>
  <text x="626" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">Face model</text>
  <line x1="626" y1="104" x2="626" y2="118" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="574" y="120" width="104" height="26" rx="6" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.1"/>
  <text x="626" y="137" text-anchor="middle" font-size="9.5" fill="#A1A1AA">probabilities</text>
  <line x1="626" y1="146" x2="626" y2="160" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="574" y="162" width="104" height="24" rx="12" fill="#10B981" fill-opacity="0.07" stroke="#10B981" stroke-width="1.1"/>
  <text x="626" y="177" text-anchor="middle" font-size="9" fill="#34D399">temperature scale (val)</text>

  <!-- merge into weighted average -->
  <line x1="456" y1="186" x2="500" y2="206" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <line x1="626" y1="186" x2="582" y2="206" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="481" y="208" width="120" height="32" rx="8" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-width="1.3"/>
  <text x="541" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">weighted average</text>

  <!-- slider graphic -->
  <line x1="446" y1="262" x2="636" y2="262" stroke="#71717A" stroke-width="1.2"/>
  <circle cx="636" cy="262" r="4" fill="#34D399"/>
  <text x="446" y="278" font-size="9" fill="#71717A">w=0</text>
  <text x="636" y="278" text-anchor="end" font-size="9" fill="#34D399" font-weight="600">w=1</text>
  <text x="541" y="293" text-anchor="middle" font-size="9.5" fill="#A1A1AA">audio-only stays in the grid, so the blend</text>
  <text x="541" y="305" text-anchor="middle" font-size="9.5" fill="#A1A1AA">can never do worse than audio</text>

  <!-- output badge emerald -->
  <line x1="541" y1="240" x2="541" y2="252" stroke="#10B981" stroke-width="1.3" marker-end="url(#ar-g)"/>
  <rect x="492" y="316" width="118" height="40" rx="10" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1.4"/>
  <text x="551" y="343" text-anchor="middle" font-size="20" font-weight="700" fill="#34D399">78.8%</text>
</svg>