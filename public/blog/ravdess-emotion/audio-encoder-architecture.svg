<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif"><defs><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10B981"/></marker><marker id="agy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#71717A"/></marker></defs>

<!-- Waveform bottom -->
<g transform="translate(60,360)">
<rect x="0" y="-22" width="120" height="30" rx="7" fill="#71717A" fill-opacity="0.1" stroke="#71717A" stroke-width="1.2"/>
<polyline points="14,-7 22,-13 30,-1 38,-15 46,-3 54,-11 62,-6 70,-12 78,-2 86,-14 94,-5 102,-9" fill="none" stroke="#A1A1AA" stroke-width="1.3"/>
<text x="60" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#A1A1AA">Waveform</text>
</g>
<line x1="120" y1="338" x2="120" y2="312" stroke="#71717A" stroke-width="1.3" marker-end="url(#agy)"/>

<!-- Frozen WavLM box with 25 layer bars -->
<rect x="50" y="40" width="140" height="270" rx="10" fill="#71717A" fill-opacity="0.06" stroke="#71717A" stroke-width="1.2"/>
<text x="62" y="32" font-size="12" font-weight="600" fill="#A1A1AA">Frozen WavLM-large</text>
<!-- lock icon -->
<g transform="translate(166,22)" stroke="#71717A" stroke-width="1.2" fill="none">
<rect x="0" y="5" width="14" height="11" rx="2" fill="#71717A" fill-opacity="0.18"/>
<path d="M3 5 V3 a4 4 0 0 1 8 0 V5"/>
</g>

<!-- 25 layer bars: L0 bottom (y=300) to L24 top (y=48). step = 252/25 ~10.08, bar h=8 -->
<!-- dim bottom L0-L7, bright middle L8-L16, dim top L17-L24 -->
<g>
<!-- bottom dim -->
<rect x="60" y="298" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="288" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="278" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="268" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="258" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.4"/>
<rect x="60" y="248" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.4"/>
<rect x="60" y="238" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.45"/>
<rect x="60" y="228" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.45"/>
<!-- middle bright emerald L8-L16 -->
<rect x="60" y="218" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.55"/>
<rect x="60" y="208" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.7"/>
<rect x="60" y="198" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.85"/>
<rect x="60" y="188" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.95"/>
<rect x="60" y="178" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.95"/>
<rect x="60" y="168" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.95"/>
<rect x="60" y="158" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.85"/>
<rect x="60" y="148" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.7"/>
<rect x="60" y="138" width="100" height="6" rx="2" fill="#34D399" fill-opacity="0.55"/>
<!-- top dim L17-L24 -->
<rect x="60" y="128" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.45"/>
<rect x="60" y="118" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.45"/>
<rect x="60" y="108" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.4"/>
<rect x="60" y="98" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.4"/>
<rect x="60" y="88" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="78" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="68" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.35"/>
<rect x="60" y="58" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.3"/>
<rect x="60" y="48" width="100" height="6" rx="2" fill="#71717A" fill-opacity="0.3"/>
</g>
<!-- L0 / L24 labels -->
<text x="46" y="305" text-anchor="end" font-size="8" fill="#71717A">L0</text>
<text x="46" y="55" text-anchor="end" font-size="8" fill="#71717A">L24</text>

<!-- side label: emotion lives here -->
<g transform="translate(196,160)">
<line x1="-36" y1="28" x2="0" y2="28" stroke="#34D399" stroke-width="1.2"/>
<text x="0" y="20" font-size="11" font-weight="600" fill="#34D399">emotion lives here</text>
<text x="0" y="46" font-size="9" fill="#A1A1AA">the last layer drifts</text>
<text x="0" y="58" font-size="9" fill="#A1A1AA">toward the words</text>
</g>

<!-- fan-out arrow to softmax weights node -->
<path d="M160 188 C 270 188, 300 175, 332 175" fill="none" stroke="#10B981" stroke-width="1.3" marker-end="url(#ag)"/>
<path d="M160 240 C 280 240, 300 188, 332 183" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.5"/>
<path d="M160 120 C 280 120, 300 162, 332 167" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.5"/>
<text x="200" y="118" font-size="8" fill="#71717A">all 25 outputs</text>

<!-- softmax layer weights node (learnable, emerald) -->
<rect x="334" y="150" width="150" height="52" rx="9" fill="#10B981" fill-opacity="0.12" stroke="#34D399" stroke-width="1.3"/>
<text x="409" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">softmax layer weights</text>
<text x="409" y="188" text-anchor="middle" font-size="9" fill="#34D399" fill-opacity="0.85">learnable, 1 combined seq</text>

<!-- arrow to attentive pooling -->
<line x1="484" y1="176" x2="528" y2="176" stroke="#10B981" stroke-width="1.3" marker-end="url(#ag)"/>

<!-- Attentive statistics pooling box with two outputs -->
<rect x="530" y="110" width="170" height="130" rx="10" fill="#10B981" fill-opacity="0.07" stroke="#34D399" stroke-width="1.3"/>
<text x="615" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">Attentive statistics</text>
<text x="615" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#34D399">pooling</text>
<rect x="544" y="154" width="68" height="30" rx="6" fill="#10B981" fill-opacity="0.16" stroke="#34D399" stroke-width="1.2"/>
<text x="578" y="173" text-anchor="middle" font-size="9.5" font-weight="600" fill="#34D399">weighted mean</text>
<rect x="618" y="154" width="68" height="30" rx="6" fill="#10B981" fill-opacity="0.16" stroke="#34D399" stroke-width="1.2"/>
<text x="652" y="173" text-anchor="middle" font-size="9.5" font-weight="600" fill="#34D399">weighted std</text>
<text x="615" y="206" text-anchor="middle" font-size="8.5" fill="#A1A1AA">std keeps the variation in tone</text>
<text x="615" y="218" text-anchor="middle" font-size="8.5" fill="#A1A1AA">a plain average throws away</text>

<!-- concatenate arrows down to MLP head -->
<path d="M578 184 C 578 250, 470 250, 470 280" fill="none" stroke="#10B981" stroke-width="1.2"/>
<path d="M652 184 C 652 250, 470 250, 470 280" fill="none" stroke="#10B981" stroke-width="1.2" marker-end="url(#ag)"/>
<text x="500" y="262" text-anchor="middle" font-size="8.5" fill="#71717A">concat mean ++ std</text>

<!-- MLP head -> 8 logits -->
<rect x="370" y="282" width="200" height="44" rx="9" fill="#10B981" fill-opacity="0.14" stroke="#34D399" stroke-width="1.3"/>
<text x="470" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#34D399">MLP head</text>
<text x="470" y="316" text-anchor="middle" font-size="10" fill="#34D399" fill-opacity="0.9">8 logits</text>

<!-- legend -->
<g transform="translate(50,352)">
<rect x="280" y="0" width="12" height="12" rx="3" fill="#34D399" fill-opacity="0.85"/>
<text x="298" y="10" font-size="9.5" fill="#A1A1AA">trainable: layer weights + pooling + head</text>
<rect x="280" y="18" width="12" height="12" rx="3" fill="#71717A" fill-opacity="0.4"/>
<g transform="translate(282,21)" stroke="#71717A" stroke-width="0.9" fill="none"><rect x="2" y="3" width="6" height="5" rx="1"/><path d="M3.4 3 V2 a1.6 1.6 0 0 1 3.2 0 V3"/></g>
<text x="298" y="28" font-size="9.5" fill="#A1A1AA">frozen encoder: all learning sits in the small head</text>
</g>
</svg>